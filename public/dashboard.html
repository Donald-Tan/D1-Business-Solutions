onAuthStateChanged(auth, async user => {
  if (user) {
    if (!ALLOWED_EMAILS.includes(user.email)) {
      await signOut(auth);
      document.getElementById('l-err').textContent = `Access denied. ${user.email} is not authorised.`;
      return;
    }
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display  = 'flex';
    document.getElementById('user-email').textContent = user.displayName || user.email;
    document.getElementById('user-avatar').src =
      user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName||user.email)}&background=c792ea&color=0b0d12&size=32`;
    startListening();
    startProjectsListening();
    startExpensesListening();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display  = 'none';
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    if (unsubProjects) { unsubProjects(); unsubProjects = null; }
    if (unsubExpenses) { unsubExpenses(); unsubExpenses = null; }
  }
});

window.doLogin = async () => {
  const err = document.getElementById('l-err');
  err.textContent = '';
  document.getElementById('google-btn').disabled = true;
  document.getElementById('google-btn').textContent = 'Signing in…';
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
      try {
        await signInWithRedirect(auth, provider);
      } catch(e2) {
        err.textContent = 'Sign-in failed. Please try again.';
        document.getElementById('google-btn').disabled = false;
        document.getElementById('google-btn').innerHTML = googleBtnHTML;
      }
    } else {
      err.textContent = 'Sign-in failed. Please try again.';
      document.getElementById('google-btn').disabled = false;
      document.getElementById('google-btn').innerHTML = googleBtnHTML;
    }
  }
};

// ── Firestore: CRM real-time listener ────────────────────────────────────────
async function startListening() {
  const col = collection(db, 'contacts');
  const snap = await getDocs(col);
  if (snap.empty) {
    for (const c of SEED) await addDoc(col, c);
  }
  unsubscribe = onSnapshot(col, snapshot => {
    contacts = snapshot.docs.map(d => ({ _id: d.id, ...d.data() }));
    renderTable();
  });
}

// ── Firestore: Projects real-time listener ───────────────────────────────────
function startProjectsListening() {
  const col = collection(db, 'projects');
  unsubProjects = onSnapshot(col, snapshot => {
    projects = snapshot.docs.map(d => ({ _id: d.id, ...d.data() }));
    renderKanban();
  });
}

// ── Firestore: Expenses real-time listener ───────────────────────────────────
function startExpensesListening() {
  const col = collection(db, 'expenses');
  unsubExpenses = onSnapshot(col, snapshot => {
    expenses = snapshot.docs.map(d => ({ _id: d.id, ...d.data() }));
    renderExpenses();
  });
}

// ── Kanban render ─────────────────────────────────────────────────────────────
const KANBAN_COLS = ['Backlog', 'In Progress', 'Review', 'Done'];
const PRIORITY_COLOR = {
  'High':   'var(--orange)',
  'Medium': 'var(--yellow)',
  'Low':    'var(--green)',
};

window.renderKanban = () => {
  const today = new Date().toISOString().slice(0,10);
  const total  = projects.length;
  const inProg = projects.filter(p => p.status === 'In Progress').length;
  const done   = projects.filter(p => p.status === 'Done').length;
  const overdue = projects.filter(p => p.due && p.due < today && p.status !== 'Done').length;

  document.getElementById('proj-stats').innerHTML = `
    <div class="stat-card"><div class="stat-lbl">Total projects</div><div class="stat-val" style="color:var(--ink)">${total}</div></div>
    <div class="stat-card"><div class="stat-lbl" style="color:var(--accent2)">In Progress</div><div class="stat-val" style="color:var(--accent2)">${inProg}</div></div>
    <div class="stat-card"><div class="stat-lbl" style="color:var(--green)">Done</div><div class="stat-val" style="color:var(--green)">${done}</div></div>
    <div class="stat-card"><div class="stat-lbl" style="color:var(--orange)">Overdue</div><div class="stat-val" style="color:var(--orange)">${overdue}</div></div>
  `;

  const board = document.getElementById('kanban-board');
  board.innerHTML = KANBAN_COLS.map(col => {
    const cards = projects.filter(p => p.status === col);
    const cardsHTML = cards.map(p => {
      const isOverdue = p.due && p.due < today && col !== 'Done';
      const prColor = PRIORITY_COLOR[p.priority] || 'var(--ink3)';
      return `<div class="k-card" onclick="openProjModal('${p._id}')">
        <div class="k-card-title">${esc(p.title)}</div>
        ${p.client ? `<div class="k-card-client">${esc(p.client)}</div>` : ''}
        <div class="k-card-meta">
          ${p.priority ? `<span style="font-size:0.68rem;font-weight:600;color:${prColor};background:${prColor}18;border:1px solid ${prColor}30;border-radius:100px;padding:1px 8px">${esc(p.priority)}</span>` : ''}
          ${p.due ? `<span style="font-size:0.68rem;color:${isOverdue?'var(--orange)':'var(--ink3)'};font-weight:${isOverdue?'600':'300'}">${p.due}</span>` : ''}
        </div>
        ${p.notes ? `<div style="font-size:0.72rem;color:var(--ink3);margin-top:0.4rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.notes)}</div>` : ''}
      </div>`;
    }).join('');
    return `<div class="k-col">
      <div class="k-col-header">
        <span class="k-col-title">${col}</span>
        <span class="k-count">${cards.length}</span>
      </div>
      <div class="k-cards">${cardsHTML}</div>
      <button class="k-add-btn" onclick="openProjModal(null,'${col}')">+ Add card</button>
    </div>`;
  }).join('');
};

  const total      = expenses.reduce((s,e) => s + (parseFloat(e.amount)||0), 0);
  const monthTotal = expenses.filter(e => (e.date||'').startsWith(thisMonth)).reduce((s,e) => s + (parseFloat(e.amount)||0), 0);
  const donaldTot  = expenses.filter(e => e.paid_by === 'Donald').reduce((s,e) => s + (parseFloat(e.amount)||0), 0);
  const leonTot    = expenses.filter(e => e.paid_by === 'Leon').reduce((s,e) => s + (parseFloat(e.amount)||0), 0);

  document.getElementById('exp-stats-bar').innerHTML = `
    <div class="exp-stat"><div class="stat-lbl">Total spent</div><div class="stat-val" style="color:var(--ink)">$${total.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
    <div class="exp-stat"><div class="stat-lbl" style="color:var(--accent2)">This month</div><div class="stat-val" style="color:var(--accent2)">$${monthTotal.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
    <div class="exp-stat"><div class="stat-lbl" style="color:var(--green)">Donald</div><div class="stat-val" style="color:var(--green)">$${donaldTot.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
    <div class="exp-stat"><div class="stat-lbl" style="color:var(--cyan)">Leon</div><div class="stat-val" style="color:var(--cyan)">$${leonTot.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
  `;

  const CAT_COLOR = {
    'Software':   'var(--accent)',
    'Marketing':  'var(--accent2)',
    'Equipment':  'var(--cyan)',
    'Travel':     'var(--yellow)',
    'Meals':      'var(--green)',
    'Contractor': 'var(--orange)',
    'Other':      'var(--ink3)',
  };

  const tbody = document.getElementById('exp-tbody');
  if (sorted.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--ink3)">No expenses yet. Add one above.</td></tr>`;
    return;
  }
  tbody.innerHTML = sorted.map(e => {
    const cc = CAT_COLOR[e.category] || 'var(--ink3)';
    return `<tr class="trow">
      <td style="color:var(--ink3);font-size:0.75rem">${e.date||'—'}</td>
      <td style="font-weight:500;color:var(--ink)">${esc(e.description)}</td>
      <td><span style="font-size:0.68rem;font-weight:600;color:${cc};background:${cc}18;border:1px solid ${cc}30;border-radius:100px;padding:1px 9px">${esc(e.category||'')}</span></td>
      <td style="color:var(--green);font-weight:500">$${(parseFloat(e.amount)||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
      <td style="color:var(--ink2);font-size:0.78rem">${esc(e.paid_by||'')}</td>
      <td style="color:var(--ink3);font-size:0.75rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.notes||'')}</td>
      <td><button class="edit-btn" onclick="openExpModal('${e._id}')">Edit</button></td>
    </tr>`;
  }).join('');
};

// ── Filtering & Sorting ───────────────────────────────────────────────────────
window.sortBy = col => {
  sortCol === col ? sortDir *= -1 : (sortCol = col, sortDir = 1);
  currentPage = 1;
  renderTable();
};

window.goPage = (p) => { currentPage = p; renderTable(); };

window.renderTable = () => {
  const q   = (document.getElementById('search')?.value || '').toLowerCase();
  const ft  = document.getElementById('f-industry')?.value || '';
  const fs  = document.getElementById('f-status-filter')?.value || '';

  let data = contacts.filter(c =>
    (!q  || (c.name||'').toLowerCase().includes(q) || (c.phone||'').includes(q) || (c.owner||'').toLowerCase().includes(q)) &&
    (!ft || c.type === ft) &&
    (!fs || c.status === fs)
  );
  data.sort((a,b) => ((a[sortCol]||'').localeCompare(b[sortCol]||'')) * sortDir);

  const totalPages = Math.max(1, Math.ceil(data.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const pageData = data.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

  const statusColor = {
    'Agreed':         { bg: 'rgba(195,232,141,0.12)', color: 'var(--green)',   border: 'rgba(195,232,141,0.25)' },
    'Callback':       { bg: 'rgba(255,203,107,0.12)', color: 'var(--yellow)',  border: 'rgba(255,203,107,0.25)' },
    'Not interested': { bg: 'rgba(247,140,108,0.12)', color: 'var(--orange)',  border: 'rgba(247,140,108,0.25)' },
    'Not valid':      { bg: 'rgba(247,140,108,0.1)',  color: 'var(--orange)',  border: 'rgba(247,140,108,0.2)'  },
    'No reply':       { bg: 'rgba(141,148,173,0.1)',  color: 'var(--ink3)',    border: 'rgba(141,148,173,0.2)'  },
    'Not contacted':  { bg: 'rgba(130,170,255,0.1)',  color: 'var(--accent2)', border: 'rgba(130,170,255,0.2)'  },
    'Send demo':      { bg: 'rgba(199,146,234,0.12)', color: 'var(--accent)',  border: 'rgba(199,146,234,0.25)' },
    'In transition':  { bg: 'rgba(137,221,255,0.1)',  color: 'var(--cyan)',    border: 'rgba(137,221,255,0.2)'  },
    'User busy':      { bg: 'rgba(141,148,173,0.1)',  color: 'var(--ink3)',    border: 'rgba(141,148,173,0.2)'  },
  };

  const badge = s => {
    const sc = statusColor[s] || { bg: 'rgba(141,148,173,0.1)', color: 'var(--ink3)', border: 'rgba(141,148,173,0.2)' };
    return `<span style="display:inline-block;padding:2px 9px;border-radius:100px;font-size:0.68rem;font-weight:600;letter-spacing:0.04em;background:${sc.bg};color:${sc.color};border:1px solid ${sc.border};white-space:nowrap">${esc(s)}</span>`;
  };

  const tbody = document.getElementById('tbody');
  const noRes = document.getElementById('no-res');
  noRes.style.display = data.length ? 'none' : 'block';
  tbody.innerHTML = pageData.map(c => `<tr class="trow">
    <td style="font-weight:500;color:var(--ink)">${c.maps ? `<a href="${esc(c.maps)}" target="_blank" style="color:var(--accent2);text-decoration:none">${esc(c.name)}</a>` : esc(c.name)}</td>
    <td style="color:var(--ink3);font-size:0.78rem">${esc(c.type)||'—'}</td>
    <td style="color:var(--ink2);font-size:0.78rem">${esc(c.phone)||'—'}</td>
    <td style="color:var(--ink2);font-size:0.78rem">${esc(c.city)||'—'}</td>
    <td style="color:var(--ink3);font-size:0.78rem">${esc(c.who)||'—'}</td>
    <td style="color:var(--ink3);font-size:0.75rem">${c.last||'—'}</td>
    <td style="color:${c.follow && c.follow <= new Date().toISOString().slice(0,10) ? 'var(--orange)' : 'var(--ink3)'};font-size:0.75rem;font-weight:${c.follow && c.follow <= new Date().toISOString().slice(0,10) ? '600' : '300'}">${c.follow ? c.follow + (c.follow_time ? '<br><span style="font-size:0.7rem;opacity:0.75">'+esc(c.follow_time)+'</span>' : '') : '—'}</td>
    <td>${badge(c.status)}</td>
    <td style="color:var(--green);font-size:0.78rem;font-weight:500">${c.price ? '$'+c.price : ''}</td>
    <td style="color:var(--ink3);font-size:0.72rem">${c.added||'—'}</td>
    <td><button class="edit-btn" onclick="openModal('${c._id}')">Edit</button></td>
  </tr>`).join('');

  const pager = document.getElementById('pager');
  if (totalPages <= 1) { pager.innerHTML = ''; }
  else {
    let btns = '';
    for (let i = 1; i <= totalPages; i++) {
      btns += `<button onclick="goPage(${i})" style="padding:4px 10px;border-radius:6px;border:1px solid ${i===currentPage?'var(--accent2)':'rgba(255,255,255,0.1)'};background:${i===currentPage?'rgba(130,170,255,0.15)':'transparent'};color:${i===currentPage?'var(--accent2)':'var(--ink3)'};cursor:pointer;font-size:0.78rem">${i}</button>`;
    }
    pager.innerHTML = `<div style="display:flex;gap:6px;align-items:center;justify-content:center;padding:12px 0;flex-wrap:wrap">
      <span style="color:var(--ink3);font-size:0.78rem;margin-right:4px">Showing ${(currentPage-1)*PAGE_SIZE+1}–${Math.min(currentPage*PAGE_SIZE,data.length)} of ${data.length}</span>
      ${btns}
    </div>`;
  }

  const tot = contacts.length;
  const ag  = contacts.filter(c => c.status === 'Agreed').length;
  const cb  = contacts.filter(c => c.status === 'Callback').length;
  const ni  = contacts.filter(c => ['Not interested','Not valid'].includes(c.status)).length;
  const nc  = contacts.filter(c => c.status === 'Not contacted').length;
  const rev = contacts.filter(c => c.price).reduce((s,c) => s + parseFloat(c.price||0), 0);
  document.getElementById('crm-stats').innerHTML = `
    <div class="stat-card"><div class="stat-lbl">Total leads</div><div class="stat-val" style="color:var(--ink)">${tot}</div></div>
    <div class="stat-card"><div class="stat-lbl" style="color:var(--green)">Agreed</div><div class="stat-val" style="color:var(--green)">${ag}</div></div>
    <div class="stat-card"><div class="stat-lbl" style="color:var(--yellow)">Callbacks</div><div class="stat-val" style="color:var(--yellow)">${cb}</div></div>
    <div class="stat-card"><div class="stat-lbl" style="color:var(--orange)">Not interested</div><div class="stat-val" style="color:var(--orange)">${ni}</div></div>
    <div class="stat-card"><div class="stat-lbl" style="color:var(--accent2)">Not contacted</div><div class="stat-val" style="color:var(--accent2)">${nc}</div></div>
    <div class="stat-card"><div class="stat-lbl" style="color:var(--accent)">Pipeline value</div><div class="stat-val" style="color:var(--accent)">$${rev.toLocaleString()}</div></div>`;
};

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>

<style>

  /* MODAL (shared base) */

  .exp-wrap { padding:1.5rem 1.75rem; }
  .exp-topbar { display:flex; align-items:center; gap:1rem; margin-bottom:1.25rem; flex-wrap:wrap; }
  .exp-stats { display:flex; gap:0; border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:1.5rem; background:var(--bg2); }
  .exp-stat { flex:1; padding:1.1rem 1.5rem; border-right:1px solid var(--border); }
  .exp-stat:last-child { border-right:none; }

  @media (max-width:700px) {
    .topbar { padding:0.75rem 1rem; }
    .mgrid { grid-template-columns:1fr; }
    .fg.full { grid-column:1; }
    .tbl-wrap { padding:0.75rem 0.75rem 2rem; }
    .maps-row { padding:0.75rem 1rem; }
    .stats-bar { flex-wrap:nowrap; }
    .kanban { padding:1rem; }
    .exp-wrap { padding:1rem; }
    .exp-stats { flex-wrap:wrap; }
    .exp-stat { border-right:none; border-bottom:1px solid var(--border); }
    .exp-stat:last-child { border-bottom:none; }
  }
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ─────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">D1</div>
    <div class="login-sub">Team Dashboard</div>
    <button class="google-btn" id="google-btn" onclick="doLogin()">
      <svg class="google-icon" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/><path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.5 16 19 12 24 12c3.1 0 5.8 1.1 8 2.9l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.2 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8H6.3C9.6 35.4 16.3 44 24 44z" /><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.2 5.2C37 39 44 34 44 24c0-1.3-.1-2.7-.4-3.9z"/></svg>
      Continue with Google
    </button>
    <div class="login-err" id="l-err"></div>
    <div class="login-team">D1 Business Solutions · Internal use only</div>
  </div>
</div>

<!-- ── APP SCREEN ───────────────────────────────────────────────────────────── -->
<div id="app-screen">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo">D1</div>
    <div class="topbar-sep"></div>
    <button class="nav-tab active" id="tab-crm" onclick="switchPage('crm')">CRM</button>
    <button class="nav-tab" id="tab-projects" onclick="switchPage('projects')">Projects</button>
    <button class="nav-tab" id="tab-expenses" onclick="switchPage('expenses')">Expenses</button>
    <div class="topbar-sep"></div>
    <div id="crm-controls" style="display:contents">
      <input class="topbar-search" id="search" type="text" placeholder="Search contacts…" oninput="currentPage=1;renderTable()">
      <select class="topbar-select" id="f-industry" onchange="currentPage=1;renderTable()">
        <option value="">All industries</option>
        <option>Auto Repair</option>
        <option>Plumbing</option>
        <option>HVAC</option>
        <option>Landscaping</option>
        <option>Other</option>
      </select>
      <select class="topbar-select" id="f-status-filter" onchange="currentPage=1;renderTable()">
        <option value="">All statuses</option>
        <option>Agreed</option>
        <option>Callback</option>
        <option>Not interested</option>
        <option>Not valid</option>
        <option>No reply</option>
        <option>Not contacted</option>
        <option>Send demo</option>
        <option>In transition</option>
        <option>User busy</option>
      </select>
      <button class="topbar-btn primary" onclick="openModal()">+ Add contact</button>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-user">
      <img class="user-avatar" id="user-avatar" src="" alt="">
      <strong id="user-email"></strong>
    </div>
    <button class="topbar-logout" onclick="doLogout()">Sign out</button>
  </div>

  <!-- ── PAGE: CRM ─────────────────────────────────────────────────────────── -->
  <div id="page-crm" style="display:flex;flex-direction:column;flex:1">

    <!-- Stats -->
    <div class="stats-bar" id="crm-stats"></div>

    <!-- Maps quick-add -->
    <div class="maps-row">
      <span class="maps-label">Add from Maps</span>
      <input class="maps-input" id="maps-url" type="text" placeholder="Paste a Google Maps link…">
      <button class="maps-btn" onclick="addFromMaps()">Add &amp; fill →</button>
    </div>

    <!-- Table -->
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:200px" onclick="sortBy('name')">Business ↕</th>
          <th style="width:90px"  onclick="sortBy('type')">Industry ↕</th>
          <th style="width:120px">Phone</th>
          <th style="width:80px">City</th>
          <th style="width:60px">By</th>
          <th style="width:95px" onclick="sortBy('last')">Last contact ↕</th>
          <th style="width:95px" onclick="sortBy('follow')">Follow-up ↕</th>
          <th style="width:115px" onclick="sortBy('status')">Status ↕</th>
          <th style="width:65px">Price</th>
          <th style="width:90px" onclick="sortBy('added')">Date added ↕</th>
          <th style="width:55px"></th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="no-res">No contacts match your filters.</div>
      <div id="pager"></div>
    </div>

  </div><!-- end #page-crm -->

  <!-- ── PAGE: PROJECTS (Kanban) ───────────────────────────────────────────── -->
  <div id="page-projects" style="display:none">

    <!-- Project stats -->
    <div class="stats-bar" id="proj-stats"></div>

    <!-- Kanban board -->
    <div class="kanban" id="kanban-board"></div>

  </div><!-- end #page-projects -->

  <!-- ── PAGE: EXPENSES ───────────────────────────────────────────────────── -->
  <div id="page-expenses" style="display:none">
    <div class="exp-wrap">

      <!-- Expense topbar controls -->
      <div class="exp-topbar">
        <button class="topbar-btn primary" onclick="openExpModal()">+ Add expense</button>
        <select class="topbar-select" id="exp-cat-filter" onchange="renderExpenses()">
          <option value="">All categories</option>
          <option>Software</option>
          <option>Marketing</option>
          <option>Equipment</option>
          <option>Travel</option>
          <option>Meals</option>
          <option>Contractor</option>
          <option>Other</option>
        </select>
      </div>

      <!-- Expense stats -->
      <div class="exp-stats" id="exp-stats-bar"></div>

      <!-- Expense table -->
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th style="width:100px">Date</th>
            <th style="width:220px">Description</th>
            <th style="width:110px">Category</th>
            <th style="width:100px">Amount</th>
            <th style="width:90px">Paid by</th>
            <th>Notes</th>
            <th style="width:55px"></th>
          </tr></thead>
          <tbody id="exp-tbody"></tbody>
        </table>
      </div>

    </div>
  </div><!-- end #page-expenses -->

</div><!-- end #app-screen -->

<!-- ── CRM MODAL ────────────────────────────────────────────────────────────── -->
<div id="overlay" class="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="m-title">Add contact</div>
    <div class="mgrid">
      <div class="fg"><label>Business name *</label><input id="f-name" type="text"></div>
      <div class="fg"><label>Owner's name</label><input id="f-owner" type="text"></div>
      <div class="fg"><label>Industry</label>
        <select id="f-type"><option>Auto Repair</option><option>Plumbing</option><option>HVAC</option><option>Landscaping</option><option>Other</option></select>
      </div>
      <div class="fg"><label>City</label><input id="f-city" type="text"></div>
      <div class="fg"><label>Phone</label><input id="f-phone" type="text"></div>
      <div class="fg"><label>Email</label><input id="f-email" type="text"></div>
      <div class="fg"><label>Contacted by</label>
        <select id="f-who"><option value="">—</option><option>Donald</option><option>Leon</option></select>
      </div>
      <div class="fg"><label>Last contacted</label><input id="f-last" type="date"></div>
      <div class="fg"><label>Follow-up date</label><input id="f-follow" type="date"></div>
      <div class="fg"><label>Follow-up time</label><input id="f-follow_time" type="time"></div>
      <div class="fg"><label>Scheduled meeting</label><input id="f-meeting" type="text" placeholder="e.g. Monday 10AM"></div>
      <div class="fg"><label>Status</label>
        <select id="f-status">
          <option>Not contacted</option><option>Callback</option><option>Agreed</option>
          <option>Not interested</option><option>Not valid</option><option>No reply</option>
          <option>Send demo</option><option>In transition</option><option>User busy</option>
        </select>
      </div>
      <div class="fg"><label>Closing price ($)</label><input id="f-price" type="number"></div>
      <div class="fg"><label>Maintenance fee ($/yr)</label><input id="f-maint" type="number"></div>
      <div class="fg full"><label>Google Maps link</label><input id="f-maps" type="text" placeholder="https://maps.app.goo.gl/…"></div>
      <div class="fg full"><label>Response provided</label><textarea id="f-response"></textarea></div>
      <div class="fg full"><label>Notes</label><textarea id="f-notes"></textarea></div>
    </div>
    <div class="mfooter">
      <button class="mbtn mbtn-danger" id="del-btn" onclick="deleteContact()" style="display:none">Delete</button>
      <div class="mfooter-right">
        <button class="mbtn" onclick="closeModal()">Cancel</button>
        <button class="mbtn mbtn-primary" onclick="saveContact()">Save contact</button>
      </div>
    </div>
  </div>
</div>

<!-- ── PROJECTS MODAL ───────────────────────────────────────────────────────── -->
<div id="proj-overlay" class="modal-overlay">
  <div class="modal" style="width:520px">
    <div class="modal-title" id="pm-title">Add project</div>
    <div class="mgrid">
      <div class="fg full"><label>Title *</label><input id="pf-title" type="text" placeholder="Project name"></div>
      <div class="fg"><label>Client</label><input id="pf-client" type="text" placeholder="Client name"></div>
      <div class="fg"><label>Status</label>
        <select id="pf-status">
          <option>Backlog</option>
          <option>In Progress</option>
          <option>Review</option>
          <option>Done</option>
        </select>
      </div>
      <div class="fg"><label>Priority</label>
        <select id="pf-priority">
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>
      </div>
      <div class="fg"><label>Due date</label><input id="pf-due" type="date"></div>
      <div class="fg full"><label>Notes</label><textarea id="pf-notes" style="min-height:80px"></textarea></div>
    </div>
    <div class="mfooter">
      <button class="mbtn mbtn-danger" id="pdel-btn" onclick="deleteProject()" style="display:none">Delete</button>
      <div class="mfooter-right">
        <button class="mbtn" onclick="closeProjModal()">Cancel</button>
        <button class="mbtn mbtn-primary" onclick="saveProject()">Save project</button>
      </div>
    </div>
  </div>
</div>

<!-- ── EXPENSES MODAL ───────────────────────────────────────────────────────── -->
<div id="exp-overlay" class="modal-overlay">
  <div class="modal" style="width:520px">
    <div class="modal-title" id="em-title">Add expense</div>
    <div class="mgrid">
      <div class="fg full"><label>Description *</label><input id="ef-description" type="text" placeholder="What was purchased?"></div>
      <div class="fg"><label>Amount ($) *</label><input id="ef-amount" type="number" step="0.01" min="0" placeholder="0.00"></div>
      <div class="fg"><label>Date</label><input id="ef-date" type="date"></div>
      <div class="fg"><label>Category</label>
        <select id="ef-category">
          <option>Software</option>
          <option>Marketing</option>
          <option>Equipment</option>
          <option>Travel</option>
          <option>Meals</option>
          <option>Contractor</option>
          <option>Other</option>
        </select>
      </div>
      <div class="fg"><label>Paid by</label>
        <select id="ef-paid_by">
          <option>Donald</option>
          <option>Leon</option>
          <option>Business</option>
        </select>
      </div>
      <div class="fg full"><label>Notes</label><textarea id="ef-notes" style="min-height:70px"></textarea></div>
    </div>
    <div class="mfooter">
      <button class="mbtn mbtn-danger" id="edel-btn" onclick="deleteExpense()" style="display:none">Delete</button>
      <div class="mfooter-right">
        <button class="mbtn" onclick="closeExpModal()">Cancel</button>
        <button class="mbtn mbtn-primary" onclick="saveExpense()">Save expense</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
